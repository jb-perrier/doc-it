<!doctype html>
<html lang="en" data-theme="dark" style="color-scheme: dark">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<meta name="description"
		content="Doc-it is a minimal realtime collaborative editor for Markdown-backed documents." />
	<script>
		(() => {
			const storageKey = 'docit.theme';
			const defaultTheme = 'dark';
			let theme = defaultTheme;

			try {
				const storedTheme = window.localStorage.getItem(storageKey);
				if (storedTheme === 'light' || storedTheme === 'dark') {
					theme = storedTheme;
				}
			} catch {
				theme = defaultTheme;
			}

			document.documentElement.dataset.theme = theme;
			document.documentElement.style.colorScheme = theme;
		})();
	</script>
	<style>
		html {
			background: #0d1014;
			min-height: 100%;
		}

		body {
			margin: 0;
			min-height: 100vh;
			color: #f7f3ee;
			background: linear-gradient(180deg, #171b21 0%, #121418 28%, #0d1014 100%);
		}

		html[data-theme='light'] {
			background: #eef0ef;
		}

		html[data-theme='light'] body {
			color: #171b20;
			background: linear-gradient(180deg, #ffffff 0%, #f3f4f3 28%, #eef0ef 100%);
		}
	</style>
	%sveltekit.head%
</head>

<body data-sveltekit-preload-data="hover">
	<div style="display: contents">%sveltekit.body%</div>
</body>

</html>
